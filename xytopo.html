<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة حي رياض السلام</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: linear-gradient(135deg, #1e7e34, #ffffff);
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #1e7e34;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            direction: ltr;
            text-align: left;
        }

        #map {
            flex: 1;
            width: 100%;
        }

        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            padding: 8px 20px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
            z-index: 1000;
            direction: ltr;
        }

        .locate-button {
            background-color: #fff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #333;
            transition: background-color 0.3s;
        }
        .locate-button:hover {
            background-color: #f4f4f4;
            color: #007bff;
        }
    </style>
</head>
<body>

    <header>
        <h1>Limite Quartier Ryad Salam</h1>
    </header>

    <div id="map"></div>

    <footer>
        realise par : Jilit
    </footer>

    <script>
        const map = L.map('map').setView([30.42, -9.58], 14);

        L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google Maps'
        }).addTo(map);

        const originalUrl = 'https://map.geotoposig.com/riad_salam.geojson';
        const geojsonUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl);

        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                const riadSalamLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: '#ff0000',
                            weight: 6,
                            opacity: 1.0, 
                            fillColor: '#ff0000',
                            fillOpacity: 0.1
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        const name = (feature.properties && feature.properties.name) ? feature.properties.name : "حي رياض السلام";
                        layer.bindPopup(name);
                    }
                }).addTo(map);

                setTimeout(() => {
                    map.fitBounds(riadSalamLayer.getBounds());
                }, 200);
            })
            .catch(error => {
                console.error('حدث خطأ أثناء جلب ملف GeoJSON:', error);
            });

        const LocateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const button = L.DomUtil.create('a', 'locate-button', container);
                button.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
                button.title = "تحديد موقعي الحالي";

                let locationMarker = null;
                let locationCircle = null;

                button.onclick = function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    map.locate({ setView: true, maxZoom: 16 });
                };

                map.on('locationfound', function (e) {
                    if (locationMarker) map.removeLayer(locationMarker);
                    if (locationCircle) map.removeLayer(locationCircle);

                    locationCircle = L.circle(e.latlng, e.accuracy).addTo(map);
                    locationMarker = L.marker(e.latlng).addTo(map)
                        .bindPopup("أنت هنا في حدود " + Math.round(e.accuracy) + " أمتار").openPopup();
                });

                map.on('locationerror', function (e) {
                    console.error("تعذر تحديد الموقع الحالي:", e.message);
                });

                return container;
            }
        });

        map.addControl(new LocateControl());
    </script>

</body>
</html>
