<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة حي رياض السلام</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        /* تنسيق زر الموقع الحالي */
        .locate-button {
            background-color: #fff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #333;
            transition: background-color 0.3s;
        }
        .locate-button:hover {
            background-color: #f4f4f4;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. تهيئة الخريطة وتحديد مركز افتراضي (سيتم تحديثه تلقائياً ليتناسب مع الطبقة)
        const map = L.map('map').setView([30.42, -9.58], 14);

       // إضافة خلفية قمر صناعي من جوجل مدمجة مع الأسماء والخطوط (Google Hybrid)
const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
    attribution: '&copy; Google Maps'
}).addTo(map);

        // 3. جلب وعرض طبقة GeoJSON باللون الأحمر مع حل مشكلة الـ CORS
        // قمنا بإضافة بروكسب آمن مشهور (cors-anywhere بديل أو allorigins) لتخطي حظر المتصفح
        const originalUrl = 'https://map.geotoposig.com/riad_salam.geojson';
        const geojsonUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl);

        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                // تنسيق الطبقة باللون الأحمر
                const riadSalamLayer = L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: '#ff0000',       // لون الحدود (أحمر)
                            weight: 3,              // سمك الحدود
                            opacity: 0.8,           // شفافية الحدود
                            fillColor: '#ff0000',   // لون التعبئة (أحمر)
                            fillOpacity: 0.35       // شفافية التعبئة
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(feature.properties.name);
                        } else {
                            layer.bindPopup("حي رياض السلام");
                        }
                    }
                }).addTo(map);

                // عمل Zoom تلقائي ليتناسب مع حجم وموقع الطبقة المجلوبة بدقة
                setTimeout(() => {
                    map.fitBounds(riadSalamLayer.getBounds());
                }, 200);
            })
            .catch(error => {
                console.error('حدث خطأ أثناء جلب ملف GeoJSON:', error);
                // حل بديل في حال استمر الخطأ: تنبيه المطور في وحدة التحكم
                alert("تنبيه: تأكد من رفع ملف الـ geojson على نفس مستودع GitHub الخاص بك لتجنب مشاكل النطاقات الخارجية.");
            });

        // 4. إضافة زر "موقعي الحالي" المخصص
        const LocateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const button = L.DomUtil.create('a', 'locate-button', container);
                button.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
                button.title = "تحديد موقعي الحالي";

                let locationMarker = null;
                let locationCircle = null;

                button.onclick = function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    map.locate({ setView: true, maxZoom: 16 });
                };

                map.on('locationfound', function (e) {
                    if (locationMarker) map.removeLayer(locationMarker);
                    if (locationCircle) map.removeLayer(locationCircle);

                    locationCircle = L.circle(e.latlng, e.accuracy).addTo(map);
                    locationMarker = L.marker(e.latlng).addTo(map)
                        .bindPopup("أنت هنا في حدود " + Math.round(e.accuracy) + " أمتار").openPopup();
                });

                map.on('locationerror', function (e) {
                    alert("تعذر تحديد موقعك الحالي: " + e.message);
                });

                return container;
            }
        });

        map.addControl(new LocateControl());
    </script>

</body>
</html>
