<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة حي رياض السلام</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* إعدادات الصفحة الأساسية لتوزيع العناصر عمودياً */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تنسيق الهيدر المتدرج بالأخضر والأبيض */
        header {
            background: linear-gradient(135deg, #1e7e34, #ffffff);
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000; /* ليبقى فوق الخريطة */
        }
        
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #1e7e34; /* لون النص الأساسي */
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            direction: ltr; /* لعرض النص اللاتيني بشكل صحيح */
            text-align: left;
        }

        /* تنسيق الخريطة لتملأ المساحة المتبقية */
        #map {
            flex: 1;
            width: 100%;
        }

        /* تنسيق الفوتر */
        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            padding: 8px 20px;
            text-align: center;
            font-size: 14px;
            color: #6c757d;
            z-index: 1000;
            direction: ltr;
        }

        /* تنسيق زر الموقع الحالي */
        .locate-button {
            background-color: #fff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #333;
            transition: background-color 0.3s;
        }
        .locate-button:hover {
            background-color: #f4f4f4;
            color: #007bff;
        }
    </style>
</head>
<body>

    <!-- الهيدر المضاف -->
    <header>
        <h1>Limite Quartier  Ryad Salam</h1>
    </header>

    <!-- مساحة الخريطة -->
    <div id="map"></div>

    <!-- الفوتر المضاف -->
    <footer>
        realise par : Jilit
    </footer>

    <script>
        // 1. تهيئة الخريطة وتحديد مركز افتراضي
        const map = L.map('map').setView([30.42, -9.58], 14);

        // إضافة خلفية قمر صناعي من جوجل مدمجة مع الأسماء والخطوط (Google Hybrid)
        const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google Maps'
        }).addTo(map);

        // 3. جلب وعرض طبقة GeoJSON باللون الأحمر مع حل مشكلة الـ CORS
        const originalUrl = 'https://map.geotoposig.com/riad_salam.geojson';
        const geojsonUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl);

        fetch(geojsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                // تنسيق الطبقة باللون الأحمر
                const riadSalamLayer = L.geoJSON(data, {
                    style: function (feature) {
    return {
        color: '#ff0000',       // لون الحدود (أحمر)
        weight: 6,              // زيادة سمك الحدود (تم رفعه من 3 إلى 6 ليكون بارزاً)
        opacity: 5.0,           // شفافية الحدود كاملة وبدون بهتان
        fillColor: '#ff0000',   // لون التعبئة الداخلي (أحمر)
        fillOpacity: 0.1        // تقليل شفافية التعبئة لجعل التركيز أكبر على الحدود السميكة
    };
},
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(feature.properties.name);
                        } else {
                            layer.bindPopup("حي رياض السلام");
                        }
                    }
                }).addTo(map);

                // عمل Zoom تلقائي ليتناسب مع حجم وموقع الطبقة المجلوبة بدقة
                setTimeout(() => {
                    map.fitBounds(riadSalamLayer.getBounds());
                }, 200);
            })
            .catch(error => {
                console.error('حدث خطأ أثناء جلب ملف GeoJSON:', error);
                alert("تنبيه: تأكد من رفع ملف الـ geojson على نفس مستودع GitHub الخاص بك لتجنب مشاكل النطاقات الخارجية.");
            });

        // 4. إضافة زر "موقعي الحالي" المخصص
        const LocateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const button = L.DomUtil.create('a', 'locate-button', container);
                button.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
                button.title = "تحديد موقعي الحالي";

                let locationMarker = null;
                let locationCircle = null;

                button.onclick = function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    map.locate({ setView: true, maxZoom: 16 });
                };

                map.on('locationfound', function (e) {
                    if (locationMarker) map.removeLayer(locationMarker);
                    if (locationCircle) map.removeLayer(locationCircle);

                    locationCircle = L.circle(e.latlng, e.accuracy).addTo(map);
                    locationMarker = L.marker(e.latlng).addTo(map)
                        .bindPopup("أنت هنا في حدود " + Math.round(e.accuracy) + " أمتار").openPopup();
                });

                map.on('locationerror', function (e) {
                    alert("تعذر تحديد موقعك الحالي: " + e.message);
                });

                return container;
            }
        });

        map.addControl(new LocateControl());
    </script>

</body>
</html>
